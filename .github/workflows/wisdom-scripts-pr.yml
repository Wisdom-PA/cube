# Pulls latest Wisdom scripts on every PR/push to main (submodule or fresh clone).
name: Wisdom scripts

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync wisdom-scripts to latest main
        uses: Wisdom-PA/scripts/.github/actions/wisdom-scripts-sync@main
        with:
          scripts-repo: https://github.com/Wisdom-PA/scripts.git
