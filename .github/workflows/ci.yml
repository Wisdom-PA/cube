name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  wisdom-scripts:
    name: Wisdom scripts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Sync wisdom-scripts to latest main
        uses: Wisdom-PA/scripts/.github/actions/wisdom-scripts-sync@main
        with:
          scripts-repo: https://github.com/Wisdom-PA/scripts.git

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Checkstyle
        run: chmod +x mvnw && ./mvnw -B checkstyle:check

  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          cache: maven

      - name: Tests and coverage gate
        run: chmod +x mvnw && ./mvnw -B verify
